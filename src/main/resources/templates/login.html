<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ログイン</title>
</head>

<body>
	<header>
		<h1>体幹を鍛えよう！</h1>
	</header>
	<main>
		<hr>
		<form action="/login" method="post">
			<input type="text" name="name" placeholder="名前" th:value="${name}"><br>
			<input type="text" name="password" placeholder="パスワード"><br>
			<button>ログイン</button>
			<br> <span th:text="${message}"></span>
		</form>
		<a href="/users/new" method="get">新規会員登録</a>
	</main>
</body>

</html>
