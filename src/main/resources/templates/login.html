<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ログイン</title>
	<link rel="stylesheet" type="text/css" href="/css/style.css">
</head>

<body>
	<header>
			<h1>自宅で体幹を鍛えよう！</h1>
	</header>
	<main>
		<div class ="aaa">
		<h3>名前とパスワードをご入力の上、「ログイン」ボタンをクリックしてください。</h3>
		<form action="/login" method="post">
			<input type="text" name="name" placeholder="名前" th:value="${name}"><br>
			<input type="text" name="password" placeholder="パスワード"><br>
			<button>ログイン</button><br>
			</div>
			<br> <span th:text="${message}"></span>
		</form><br>
		<a href="/users/new" method="get">新規会員登録</a>
		</div>
	</main>
</body>
</html>
