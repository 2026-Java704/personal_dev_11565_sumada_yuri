<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>新規会員登録</title>
</head>

<body>
	<header>
		<h1>新規登録フォーム</h1>
	</header>
	<main>
		<h3>お客様情報</h3>
		<form action="/users/add" method="post">
			<ul th:if="${errorList}" class="error">
						<li th:each="error:${errorList}" th:text="${error}"></li>
					</ul>
			<table border="1">
				<tr>
					<th>お名前</th>
					<td>
						<input type="text" name="name" th:value="${name}">
					</td>
				</tr>
				<tr>
					<th>パスワード</th>
					<td>
						<input type="text" name="password" th:value="${password}">
					</td>
				</tr>

			</table>
			<button type="submit">新規登録</button>
		</form>
	</main>
	<hr>
	<footer th:replace="footer"></footer>
</body>

</html>
