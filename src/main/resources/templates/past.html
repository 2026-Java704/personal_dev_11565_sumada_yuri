<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>過去の記録</title>
	<link rel="stylesheet" type="text/css" href="/css/past.css">
</head>

<body>
	<header>
		<h1><span class="glitch" data-text="自宅で体幹を鍛えよう！">自宅で体幹を鍛えよう！</span></h1>
		<span th:text="${@account.name}+' さんがログイン中'"></span>
	</header>

	<main>
		<h3><span th:text="${@account.name} + ' さん、こんにちは'"></span></h3>
		<table border="1">
			<tr>
				<th>日付</th>
				<th>種目</th>
				<th>時間</th>
				<th>体重</th>
				<th>消費カロリー</th>
				<th>更新</th>
				<th>削除</th>
			</tr>
			<tr th:each="record : ${records}">
				<td th:text="${record.date}"></td>
				<td>
					<span th:each="event : ${events}">
						<span th:if="${event.id == record.eventId}" th:text="${event.name}"></span>
					</span>
				</td>
				<td th:text="${record.time + ' 分'}"></td>
				<td th:text="${record.weight + ' kg'}"></td>
				<td th:text="${'約 ' + record.burnCalorie + ' キロカロリー'}"></td>
				<td>
					<form th:action="@{/past/{pastId}/edit(pastId=${record.id})}" method="get">
						<button class="update">更新</button>
					</form>
				</td>
				<td>
					<form th:action="@{/past/{pastId}/delete(pastId=${record.id})}" method="post">
						<button class="delete">削除</button>
					</form>
				</td>
			</tr>
		</table>
		<p><a href="/records/add">入力画面へ戻る</a></p>
		<form action="/logout" method="post">
			<button type="submit">ログアウト</button>
		</form>
	</main>
</body>
</html>
